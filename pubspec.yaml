name: shubhnow_user
description: "User Application for ShubhNow - The Uber for Pandit Jis"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.9.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.4.9

  # Networking
  dio: ^5.4.0

  # Routing
  go_router: ^12.1.1

  # Local Storage
  flutter_secure_storage: ^9.0.0

  # Responsive UI
  flutter_screenutil: ^5.9.0
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  shared_preferences: ^2.5.4
  change_app_package_name: ^1.5.0
  firebase_core: ^2.0.0
  firebase_messaging: ^14.0.0
  flutter_local_notifications: ^17.2.0  # 🚀 Use this exact version
  razorpay_flutter: ^1.4.3
  intl: ^0.20.2
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # 🚀 YAHAN TERA ASSETS FOLDER ADD HO GAYA HAI
  assets:
    - assets/images/